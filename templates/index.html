<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chataia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
        }
        #chatbox {
            border: 1px solid #ccc;
            padding: 10px;
            height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .user {
            color: blue;
            margin: 5px 0;
        }
        .bot {
            color: green;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Chataia - Chatbot</h1>
    <div id="chatbox"></div>
    <form id="chat-form">
        <input type="text" id="prompt" placeholder="Type your message..." required style="width: 80%;">
        <button type="submit">Send</button>
    </form>

    <script>
        const form = document.getElementById("chat-form"); 
        const input = document.getElementById("prompt");
        const chatbox = document.getElementById("chatbox");

        const appendUserMessage = (message) => {
            chatbox.innerHTML += `<div class="user"><b>You:</b> ${message}</div>`;
        };

        const appendBotPlaceholder = () => {
            const botDiv = document.createElement("div");
            botDiv.className = "bot";
            botDiv.innerHTML = "<b>Bot:</b> ";
            chatbox.appendChild(botDiv);
            return botDiv;
        };

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const userMsg = input.value.trim();
            if (!userMsg) {
                return;
            }

            appendUserMessage(userMsg);
            const botDiv = appendBotPlaceholder();
            chatbox.scrollTop = chatbox.scrollHeight;
            input.value = "";
            form.querySelector("button").disabled = true;

            try {
                const res = await fetch("/chataia", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: userMsg })
                });

                if (!res.ok || !res.body) {
                    throw new Error(`Request failed with status ${res.status}`);
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffered = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) {
                        break;
                    }

                    buffered += decoder.decode(value, { stream: true });
                    const events = buffered.split("\n\n");
                    buffered = events.pop() || "";

                    for (const eventBlock of events) {
                        if (!eventBlock.startsWith("data: ")) {
                            continue;
                        }

                        const payload = JSON.parse(eventBlock.slice(6));
                        if (payload.error) {
                            botDiv.innerHTML = `<b>Bot:</b> ${payload.error}`;
                            continue;
                        }
                        if (payload.token) {
                            botDiv.innerHTML += payload.token;
                        }
                    }

                    chatbox.scrollTop = chatbox.scrollHeight;
                }
            } catch (error) {
                botDiv.innerHTML = `<b>Bot:</b> Error: ${error.message}`;
            } finally {
                form.querySelector("button").disabled = false;
                chatbox.scrollTop = chatbox.scrollHeight;
            }
        });
    </script>
</body>
</html>
